<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Verifica Notícia</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="logo.png" style="width:3rem; height:3rem;">
        <h1>Verifica Notícia</h1>
        <p>Combatendo a desinformação com IA</p>
      </div>

      <h2 class="auth-title">Bem-vindo de volta!</h2>
      <p class="auth-subtitle">Entre na sua conta para acessar seu histórico</p>

      <div id="alertBox"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" class="form-input" id="email" placeholder="seu@email.com" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Senha</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" class="form-input" id="password" placeholder="Sua senha" required />
            <button type="button" class="input-toggle-password" onclick="togglePassword('password')">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="btnLogin">
          <i class="fa-solid fa-right-to-bracket"></i>
          Entrar
        </button>
      </form>

      <div class="divider">ou</div>

      <a href="index.html" class="btn btn-ghost w-full">
        <i class="fa-solid fa-magnifying-glass"></i>
        Verificar sem cadastro
      </a>

      <p style="text-align:center; margin-top:24px; font-size:0.9rem; color:#6b7280;">
        Não tem conta?
        <a href="register.html" style="color:var(--primary); font-weight:600;">Cadastre-se grátis</a>
      </p>

    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    // Redireciona se já estiver logado
    if (auth.isLoggedIn()) window.location.href = 'index.html';

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const alertBox = document.getElementById('alertBox');
      alertBox.innerHTML = '';

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando...';

      try {
        const data = await api.login({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });

        auth.setToken(data.token, data.user);
        alertBox.innerHTML = `<div class="alert alert-success"><i class="fa-solid fa-check"></i> Login realizado! Redirecionando...</div>`;
        setTimeout(() => window.location.href = 'index.html', 1000);

      } catch (error) {
        alertBox.innerHTML = `<div class="alert alert-error"><i class="fa-solid fa-circle-exclamation"></i> ${error.message}</div>`;
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
      }
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>

</html>
